<!DOCTYPE html>
<html lang="en" class="mobile-mode">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>WBI · Waifu Bureau of Investigation — Mobile</title>
<meta name="description" content="WBI custom anime trading cards. The Lofi Set drops Saturday 06/06/26 at 11AM on Whatnot.">
<link rel="stylesheet" href="colors_and_type.css">
<link rel="stylesheet" href="styles.css">
<style>
  /* App-like mobile shell */
  #root{padding-bottom:74px;}            /* room for the bottom bar */
  .m-bottombar{position:fixed;left:0;right:0;bottom:0;z-index:80;display:flex;gap:10px;padding:10px 14px calc(10px + env(safe-area-inset-bottom));background:rgba(16,11,34,.92);backdrop-filter:blur(14px);border-top:1px solid var(--wbi-line);}
  .m-bottombar a{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;text-decoration:none;font-family:var(--font-heading);font-weight:700;font-size:13px;letter-spacing:.04em;text-transform:uppercase;border-radius:var(--wbi-r-pill);padding:13px 10px;}
  .m-bottombar .quote{background:var(--wbi-grad-brand);color:#fff;box-shadow:var(--wbi-glow-magenta);}
  .m-bottombar .wn{background:transparent;color:var(--wbi-cyan);border:1.5px solid var(--wbi-cyan);}
  .m-desktop{display:block;text-align:center;padding:18px 0 6px;}
  .m-desktop a{font-family:var(--font-heading);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--wbi-fg3);text-decoration:none;}
  .m-desktop a:hover{color:var(--wbi-cyan);}
  @media(min-width:760px){ .m-bottombar{display:none;} #root{padding-bottom:0;} }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
